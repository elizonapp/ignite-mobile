name: Reusable — desktop Linux

on:
  workflow_call:
    inputs:
      project-dir:
        type: string
        required: true

jobs:
  desktop-linux:
    name: Desktop Linux
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.project-dir }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.10"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun run desktop:build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-linux
          path: |
            ${{ inputs.project-dir }}/release/ignite-desktop-*.AppImage
            ${{ inputs.project-dir }}/release/latest-linux.yml
          retention-days: 14
          if-no-files-found: error
