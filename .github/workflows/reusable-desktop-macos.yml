name: Reusable — desktop macOS

on:
  workflow_call:
    inputs:
      project-dir:
        type: string
        required: true

jobs:
  desktop-macos:
    name: Desktop macOS
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ${{ inputs.project-dir }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.10"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun run desktop:build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-macos
          path: ${{ inputs.project-dir }}/release/*.dmg
          retention-days: 14
          if-no-files-found: error
