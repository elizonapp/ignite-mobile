name: Reusable — Android debug APK

on:
  workflow_call:
    inputs:
      project-dir:
        type: string
        required: true

jobs:
  android:
    name: Android (debug APK)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.project-dir }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.10"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3

      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bunx cap sync android
      - run: chmod +x android/gradlew && ./android/gradlew assembleDebug
        working-directory: ${{ inputs.project-dir }}/android

      - uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: ${{ inputs.project-dir }}/android/app/build/outputs/apk/debug/*.apk
          retention-days: 14
          if-no-files-found: warn
