name: Reusable — GitHub release

on:
  workflow_call:
    inputs:
      project-dir:
        type: string
        required: true

jobs:
  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.10"

      - name: Resolve release metadata
        id: meta
        working-directory: ${{ inputs.project-dir }}
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          TAG=$(bun -e "import('./scripts/resolve-app-version.mjs').then(m => console.log(m.resolveReleaseTag()))")
          TITLE=$(bun -e "import('./scripts/resolve-app-version.mjs').then(m => console.log(m.resolveReleaseTitle('ignite')))")
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "title=${TITLE}" >> "$GITHUB_OUTPUT"

      - name: Download web bundle
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: artifacts/web-dist

      - name: Download Linux AppImage
        uses: actions/download-artifact@v4
        with:
          name: desktop-linux
          path: artifacts/desktop-linux

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: desktop-windows-installer
          path: artifacts/desktop-windows-installer

      - name: Download Windows portable
        uses: actions/download-artifact@v4
        with:
          name: desktop-windows-portable
          path: artifacts/desktop-windows-portable

      - name: Download macOS DMG
        uses: actions/download-artifact@v4
        with:
          name: desktop-macos
          path: artifacts/desktop-macos

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-debug-apk
          path: artifacts/android-debug-apk

      - name: Prepare distributable release files
        working-directory: ${{ inputs.project-dir }}
        run: |
          chmod +x scripts/prepare-release-assets.sh
          scripts/prepare-release-assets.sh "$GITHUB_WORKSPACE/artifacts" "$GITHUB_WORKSPACE/release-upload"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.title }}
          generate_release_notes: true
          make_latest: true
          overwrite_files: true
          fail_on_unmatched_files: false
          body: |
            Automated **ignite** build from [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}).

            ### Downloads

            | Platform | File pattern |
            |---|---|
            | Web | `ignite-mobile-*-web.zip` |
            | Linux | `ignite-desktop-*-linux.AppImage` |
            | Windows (installer) | `ignite-desktop-*-windows-setup.exe` |
            | Windows (portable) | `ignite-desktop-*-windows-portable.exe` |
            | macOS | `ignite-desktop-*-macos.dmg` |
            | Android (debug) | `ignite-mobile-*-android-debug.apk` |

            Desktop auto-updates also require the original electron-builder assets on the same release: `latest.yml`, `latest-linux.yml`, `latest-mac.yml` (version check only on macOS), matching installers, and blockmaps.
          files: |
            release-upload/*
