name: Reusable — desktop Windows

on:
  workflow_call:
    inputs:
      project-dir:
        type: string
        required: true

jobs:
  desktop-windows:
    name: Desktop Windows (Installer + Portable)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ${{ inputs.project-dir }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.10"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun run desktop:build:win:builder
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Verify Windows desktop artifacts
        shell: pwsh
        run: |
          Get-ChildItem -Recurse release | Format-Table Name, Length
          if (-not (Get-ChildItem release -Recurse -Filter 'ignite-mobile-portable-*.exe' | Select-Object -First 1)) {
            throw 'Portable executable (ignite-mobile-portable-*.exe) not found in release/'
          }
          if (-not (Get-ChildItem release -Recurse -Filter 'ignite-mobile-setup-*.exe' | Select-Object -First 1)) {
            throw 'NSIS installer (ignite-mobile-setup-*.exe) not found in release/'
          }

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-windows-portable
          path: ${{ inputs.project-dir }}/release/ignite-mobile-*-portable*.exe
          retention-days: 30
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-windows-installer
          path: ${{ inputs.project-dir }}/release/ignite-mobile-*-setup*.exe
          retention-days: 30
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          path: |
            ${{ inputs.project-dir }}/release/ignite-mobile-*-setup*.exe
            ${{ inputs.project-dir }}/release/ignite-mobile-*-portable*.exe
          retention-days: 14
          if-no-files-found: warn
